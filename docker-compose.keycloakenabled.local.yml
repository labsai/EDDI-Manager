version: '3'
services:
  eddi-config-ui:
    build:
      context: .
      args:
        EDDI_API_URL: "http://localhost:7070"
        PORT: 7071
        AUTH_METHOD: 'keycloak'
        AUTH_URL: 'https://auth.labs.ai/auth'
        AUTH_REALM: 'EDDI'
        AUTH_CLIENT_ID: 'eddi-config-ui'
    image: labsai/eddi-config-ui:local
    environment:
      EDDI_API_URL: "http://localhost:7070"
      PORT: 7071
      AUTH_METHOD: 'keycloak'
      AUTH_URL: 'https://auth.labs.ai/auth'
      AUTH_REALM: 'EDDI'
      AUTH_CLIENT_ID: 'eddi-config-ui'
