version: '3'
services:
  eddi-manager:
    build:
      context: .
      args:
        EDDI_API_URL: 'http://localhost:7070'
        READ_ONLY_DOMAIN: 'https://app.labs.ai'
        PORT: 7071
        AUTH_METHOD: 'keycloak'
        AUTH_URL: 'https://sso.labs.ai/auth'
        AUTH_REALM: 'labsai'
        AUTH_CLIENT_ID: 'eddi-manager'
    image: labsai/eddi-manager:local
    environment:
      EDDI_API_URL: 'http://localhost:7070'
      READ_ONLY_DOMAIN: 'https://app.labs.ai'
      PORT: 7071
      AUTH_METHOD: 'keycloak'
      AUTH_URL: 'https://sso.labs.ai/auth'
      AUTH_REALM: 'labsai'
      AUTH_CLIENT_ID: 'eddi-manager'
