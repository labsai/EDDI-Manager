name: CI/CD

on:
  # Triggers the workflow on push or pull request events but only for the master branch
  push:
    branches: [dev]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  deploy-site:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
      - uses: google-github-actions/setup-gcloud@master
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          service_account_key: ${{ secrets.GCP_STORAGE }}
          export_default_credentials: true

      - name: Show GCS bucket info
        run: gsutil ls -L -b gs://manager-labs-ai

      - name: Install Dependencies
        run: yarn

      - name: Build Project
        run: yarn webpack --env NODE_ENV=production --progress --config webpack.config.babel.js
#      - name: Deploy Site
#        run: gsutil cp -r dist/* gs://manager-labs-ai
