# Lightweight compose for integration testing — EDDI backend + MongoDB only.
# Usage: docker compose -f docker-compose.integration.yml up -d
# Then wait ~30s for EDDI to boot: curl http://localhost:7070/q/health
services:
  eddi:
    image: labsai/eddi:latest
    ports:
      - "7070:7070"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      QUARKUS_HTTP_CORS_ORIGINS: "http://localhost:3000,http://localhost:5173"

  mongodb:
    image: mongo:6.0
    restart: always
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - integration-mongodb:/data/db

volumes:
  integration-mongodb:
